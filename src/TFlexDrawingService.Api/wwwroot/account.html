<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Личный кабинет — T-FLEX Drawing Service</title>
  <link rel="stylesheet" href="/styles.css?v=20260608-project-select-fix">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="T-FLEX Drawing Service">
      <span class="brand__name">T-FLEX</span>
      <span class="brand__suffix">Drawing Service</span>
    </a>

    <nav class="topbar__nav" aria-label="Разделы">
      <a href="/">Редактор</a>
      <a href="/account.html">ЛК</a>
      <a id="adminNavLink" href="#adminPanel" hidden>Админ</a>
    </nav>

    <div class="topbar__auth">
      <form id="loginForm" class="login-form" hidden>
        <input id="loginUserName" name="userName" autocomplete="username" placeholder="Логин" required>
        <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="Пароль" required>
        <button class="topbar__button" type="submit">Войти</button>
      </form>

      <div id="userPanel" class="user-panel" hidden>
        <span id="currentUserName"></span>
        <button id="logoutButton" class="secondary" type="button">Выйти</button>
      </div>
    </div>
  </header>

  <main id="guestMain" class="layout layout--auth">
    <section class="panel panel--wide">
      <div class="panel__header">
        <h2>Заявка на доступ</h2>
      </div>

      <form id="registerForm" class="auth-card">
        <label class="field">
          <span class="field__label">Логин</span>
          <input id="registerUserName" name="userName" autocomplete="username" required>
        </label>

        <label class="field">
          <span class="field__label">Имя</span>
          <input id="registerDisplayName" name="displayName" autocomplete="name">
        </label>

        <label class="field">
          <span class="field__label">Пароль</span>
          <input id="registerPassword" name="password" type="password" autocomplete="new-password" required>
        </label>

        <button class="primary" type="submit">Отправить заявку</button>
        <div id="registerStatus" class="empty" hidden></div>
      </form>
    </section>
  </main>

  <main id="accountMain" class="layout layout--account" hidden>
    <nav class="breadcrumbs" aria-label="Навигация">
      <span>Главная страница</span>
      <span aria-hidden="true">→</span>
      <span>Личный кабинет</span>
    </nav>

    <section class="intro intro--account">
      <h1>Личный кабинет</h1>
      <p>Проекты, сохраненные конфигурации и управление доступом.</p>
    </section>

    <section class="panel panel--wide">
      <div class="panel__header">
        <h2>Проекты</h2>
      </div>

      <div class="form-grid form-grid--compact account-create">
        <label class="field">
          <span class="field__label">Новый проект</span>
          <input id="projectNameInput" placeholder="Название">
        </label>

        <button id="createProjectButton" class="secondary" type="button">Создать проект</button>
      </div>

      <div id="accountStatus" class="empty" hidden></div>
      <div id="projectsList" class="project-list"></div>
    </section>

    <section id="adminPanel" class="panel panel--wide" hidden>
      <div class="panel__header">
        <h2>Админ-панель</h2>
      </div>

      <div class="admin-grid">
        <div>
          <h3>Пользователи</h3>
          <div class="table-wrap table-wrap--compact">
            <table>
              <thead>
                <tr>
                  <th>Логин</th>
                  <th>Статус</th>
                  <th>Роли</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody id="adminUsersTableBody"></tbody>
            </table>
          </div>
        </div>

        <div>
          <h3>Шаблоны</h3>
          <div class="table-wrap table-wrap--compact">
            <table>
              <thead>
                <tr>
                  <th>Шаблон</th>
                  <th>Форматы</th>
                  <th>Доступен</th>
                </tr>
              </thead>
              <tbody id="adminTemplatesTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/account.js?v=20260608-configuration-title"></script>
</body>
</html>
